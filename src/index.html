<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=Instrument+Sans:wght@400;500;600&display=swap"
        rel="stylesheet">
    <title>Anemo — Name Constructor</title>
    <link rel="icon" type="image/svg+xml" href="assets/icon.svg">
    <link rel="stylesheet" href="styles/style.css">
</head>

<body>
    <div class="noise"></div>

    <aside class="sidebar">
        <div class="logo">
            <img src="assets/icon.svg" alt="Anemo logo" class="logo-icon">
            <span class="logo-name">Anemo</span>
        </div>

        <nav class="controls">

            <section class="control-section">
                <h2 class="section-label">Units</h2>
                <div class="pill-tabs">
                    <button id="tab-letters" class="pill active" data-unit="letters">Letters</button>
                    <button id="tab-syllables" class="pill" data-unit="syllables">Syllables</button>
                </div>
            </section>

            <section class="control-section">
                <h2 class="section-label">Length</h2>
                <div class="pill-tabs">
                    <button id="type-fixed" class="pill active" data-type="fixed">Fixed</button>
                    <button id="type-range" class="pill" data-type="range">Range</button>
                </div>

                <div id="single-slider-container" class="slider-block">
                    <div class="slider-header">
                        <span id="single-label" class="slider-value">5</span>
                        <span class="slider-unit" id="single-unit-label">letters</span>
                    </div>
                    <input type="range" id="single-slider" min="4" max="10" value="5" class="styled-range">
                    <div class="slider-minmax">
                        <span id="single-min-label">4</span>
                        <span id="single-max-label">10</span>
                    </div>
                </div>

                <div id="range-slider-container" class="slider-block hidden">
                    <div class="slider-header">
                        <span id="range-label-from" class="slider-value">4</span>
                        <span class="slider-dash">—</span>
                        <span id="range-label-to" class="slider-value">7</span>
                        <span class="slider-unit" id="range-unit-label">letters</span>
                    </div>
                    <div class="dual-range">
                        <div class="dual-track-bg"></div>
                        <div class="dual-track-fill" id="dual-fill"></div>
                        <input type="range" id="slider-min" min="4" max="10" value="4" class="styled-range dual">
                        <input type="range" id="slider-max" min="4" max="10" value="7" class="styled-range dual">
                    </div>
                    <div class="slider-minmax">
                        <span id="range-min-label">4</span>
                        <span id="range-max-label">10</span>
                    </div>
                </div>
            </section>

            <section class="control-section">
                <h2 class="section-label">Seed / Prefix</h2>
                <input type="text" id="start-letter" class="text-input" placeholder="M, Vela, Angme…">
                <p class="input-hint">Single letter — starts with it.<br>Syllable or word — evolves it.</p>
            </section>

            <section class="control-section">
                <h2 class="section-label">Domain zone</h2>
                <div class="domain-chips" id="domain-chips"></div>
                <input type="text" id="domain-custom-input" class="text-input" placeholder="net, gg, store…">
                <p class="input-hint">Or type any custom zone.</p>
            </section>

        </nav>

        <button class="generate-btn" id="generate-btn">
            <span>Generate</span>
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
                <path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
                    stroke-linejoin="round" />
            </svg>
        </button>
    </aside>

    <div class="drawer-backdrop" id="drawer-backdrop"></div>

    <div class="bottom-bar" id="bottom-bar">
        <button class="bottom-bar-settings" id="settings-toggle" aria-label="Settings">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
                <circle cx="8" cy="8" r="2" stroke="currentColor" stroke-width="1.4" />
                <path
                    d="M8 1v2M8 13v2M1 8h2M13 8h2M3.05 3.05l1.41 1.41M11.54 11.54l1.41 1.41M3.05 12.95l1.41-1.41M11.54 4.46l1.41-1.41"
                    stroke="currentColor" stroke-width="1.4" stroke-linecap="round" />
            </svg>
            Settings
        </button>
        <button class="bottom-bar-generate" id="bottom-generate-btn">
            Generate
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
                <path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
                    stroke-linejoin="round" />
            </svg>
        </button>
    </div>

    <main class="main">
        <div class="main-inner">
            <header class="main-header">
                <h1 class="hero-title">Find your <em>name</em></h1>
                <p class="hero-sub">Abstract names for brands, products, and projects</p>
            </header>

            <div class="results-area" id="results-container">
                <div class="empty-state" id="empty-state">
                    <div class="empty-glyph">✦</div>
                    <p>Click "Generate" to see results here</p>
                </div>
            </div>
        </div>
    </main>

    <script src="scripts/script.js" type="module"></script>
</body>

</html>
